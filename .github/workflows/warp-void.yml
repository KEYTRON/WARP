name: WARP Void

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f docker/Dockerfile.void -t warp:void .
      - name: Smoke test
        run: |
          docker run --rm warp:void --version
          docker run --rm warp:void --help
