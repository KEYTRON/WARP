name: WARP Devuan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f docker/Dockerfile.devuan -t warp:devuan .
      - name: Smoke test
        run: |
          docker run --rm warp:devuan --version
          docker run --rm warp:devuan --help
