name: WARP Ubuntu

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f docker/Dockerfile.ubuntu -t warp:ubuntu .
      - name: Smoke test
        run: |
          docker run --rm warp:ubuntu --version
          docker run --rm warp:ubuntu --help
