name: WARP Arch

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f docker/Dockerfile.arch -t warp:arch .
      - name: Smoke test
        run: |
          docker run --rm warp:arch --version
          docker run --rm warp:arch --help
