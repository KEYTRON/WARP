name: WARP Alpine

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f docker/Dockerfile.alpine -t warp:alpine .
      - name: Smoke test
        run: |
          docker run --rm warp:alpine --version
          docker run --rm warp:alpine --help
