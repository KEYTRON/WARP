name: WARP AlmaLinux

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f docker/Dockerfile.almalinux -t warp:almalinux .
      - name: Smoke test
        run: |
          docker run --rm warp:almalinux --version
          docker run --rm warp:almalinux --help
