name: WARP Fedora

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f docker/Dockerfile.fedora -t warp:fedora .
      - name: Smoke test
        run: |
          docker run --rm warp:fedora --version
          docker run --rm warp:fedora --help
